#
# Sigil AI observability stack overlay.
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.sigil.yml up
#
# Access points:
#   Sigil API:          http://localhost:18080  (healthcheck: /healthz)
#   Sigil conversations: http://localhost:18080/api/v1/conversations
#   Alloy OTLP gRPC:    localhost:14317
#   Alloy OTLP HTTP:    localhost:14318
#   Alloy UI:           http://localhost:12345
#   Tempo:              http://localhost:13200
#   Prometheus (Sigil): http://localhost:19090
#   MinIO console:      http://localhost:19001
#   MySQL:              localhost:13306

x-default-logging: &logging
  driver: "json-file"
  options:
    max-size: "5m"
    max-file: "2"
    tag: "{{.Name}}"

services:
  # Override product-reviews to route telemetry through the Sigil stack
  product-reviews:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://sigil-alloy:4317
      - SIGIL_EXPORT_PROTOCOL=http
      - SIGIL_EXPORT_ENDPOINT=http://sigil:8080/api/v1/generations:export
    depends_on:
      sigil:
        condition: service_healthy
      sigil-alloy:
        condition: service_started

  # Sigil API + generation ingest server
  sigil:
    image: sigil:local
    container_name: sigil
    build:
      context: ./src/sigil
      dockerfile: Dockerfile
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    environment:
      - SIGIL_HTTP_ADDR=:8080
      - SIGIL_OTLP_GRPC_ADDR=:4317
      - SIGIL_TARGET=all
      - SIGIL_AUTH_ENABLED=false
      - SIGIL_FAKE_TENANT_ID=fake
      - SIGIL_QUERY_PROXY_PROMETHEUS_BASE_URL=http://sigil-prometheus:9090
      - SIGIL_QUERY_PROXY_TEMPO_BASE_URL=http://sigil-tempo:3200
      - SIGIL_QUERY_PROXY_TIMEOUT=30s
      - SIGIL_STORAGE_BACKEND=mysql
      - SIGIL_MYSQL_DSN=sigil:sigil@tcp(sigil-mysql:3306)/sigil?parseTime=true
      - SIGIL_OBJECT_STORE_BACKEND=s3
      - SIGIL_OBJECT_STORE_ENDPOINT=http://sigil-minio:9000
      - SIGIL_OBJECT_STORE_BUCKET=sigil
      - SIGIL_OBJECT_STORE_ACCESS_KEY=minioadmin
      - SIGIL_OBJECT_STORE_SECRET_KEY=minioadmin
      - SIGIL_OBJECT_STORE_INSECURE=true
      - SIGIL_COMPACTOR_COMPACT_INTERVAL=1m
      - SIGIL_COMPACTOR_TRUNCATE_INTERVAL=5m
      - SIGIL_COMPACTOR_RETENTION=1h
      - SIGIL_COMPACTOR_BATCH_SIZE=250
      - SIGIL_COMPACTOR_LEASE_TTL=30s
      - SIGIL_COMPACTOR_SHARD_COUNT=1
      - SIGIL_COMPACTOR_SHARD_WINDOW_SECONDS=60
      - SIGIL_COMPACTOR_WORKERS=1
      - SIGIL_COMPACTOR_CYCLE_BUDGET=30s
      - SIGIL_COMPACTOR_CLAIM_TTL=5m
      - SIGIL_COMPACTOR_TARGET_BLOCK_BYTES=67108864
      - SIGIL_EVAL_WORKER_ENABLED=false
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "sh", "-c", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /healthz HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3 && cat <&3 | head -1 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      sigil-mysql:
        condition: service_healthy
      sigil-minio:
        condition: service_started
    logging: *logging

  # Grafana Alloy — OTLP collector, forwards traces to Tempo and metrics to Prometheus
  sigil-alloy:
    image: grafana/alloy:v1.13.2
    container_name: sigil-alloy
    command:
      - run
      - /etc/alloy/config.river
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    ports:
      - "14317:4317"
      - "14318:4318"
      - "12345:12345"
    volumes:
      - ./src/sigil/alloy-config.river:/etc/alloy/config.river:ro
      - sigil-data-alloy:/var/lib/alloy/data
    depends_on:
      sigil-tempo:
        condition: service_started
      sigil-prometheus:
        condition: service_started
    logging: *logging

  # Tempo — distributed trace storage
  sigil-tempo:
    image: grafana/tempo:2.10.1
    container_name: sigil-tempo
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    ports:
      - "13200:3200"
    volumes:
      - ./src/sigil/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - sigil-data-tempo:/var/tempo
    logging: *logging

  # Prometheus — metrics storage with OTLP receiver
  sigil-prometheus:
    image: prom/prometheus:v3.10.0
    container_name: sigil-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=24h
      - --web.enable-otlp-receiver
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    ports:
      - "19090:9090"
    volumes:
      - ./src/sigil/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - sigil-data-prometheus:/prometheus
    logging: *logging

  # MySQL — Sigil metadata storage
  sigil-mysql:
    image: mysql:9.6
    container_name: sigil-mysql
    command: --max_connections=1000
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass
      - MYSQL_DATABASE=sigil
      - MYSQL_USER=sigil
      - MYSQL_PASSWORD=sigil
    ports:
      - "13306:3306"
    volumes:
      - sigil-data-mysql:/var/lib/mysql
      - ./src/sigil/mysql-bootstrap.sql:/docker-entrypoint-initdb.d/00-bootstrap.sql:ro
    healthcheck:
      test: mysql -usigil -psigil sigil -e 'select 1'
      timeout: 1s
      retries: 30
    logging: *logging

  # MinIO — S3-compatible object storage for Sigil compacted data
  sigil-minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: sigil-minio
    command: server /data --console-address ':9001'
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - sigil-data-minio:/data
    logging: *logging

volumes:
  sigil-data-alloy:
  sigil-data-tempo:
  sigil-data-prometheus:
  sigil-data-mysql:
  sigil-data-minio:
